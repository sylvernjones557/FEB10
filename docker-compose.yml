# ============================================================
# Smart Presence — Docker Compose (Unified)
# ONE container serves both Backend API + Frontend UI
# Database stays in cloud (Supabase) — no local DB needed
# ============================================================
# Usage:
#   docker compose up -d          → Start everything
#   docker compose down            → Stop everything
#   docker compose logs -f         → View live logs
#   docker compose build --no-cache → Force rebuild
# ============================================================

services:
  smartpresence:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smart_presence
    # Port mapping — exposes container's port 8000 on the host
    # On Windows, network_mode:host doesn't work (Docker uses a Linux VM),
    # so we use explicit port mapping instead.
    ports:
      - "8000:8000"
    env_file:
      - ./backend_smart_presence/.env
    environment:
      # ── CPU Performance Tuning ──
      - OMP_NUM_THREADS=2
      - OMP_WAIT_POLICY=PASSIVE
      - MKL_NUM_THREADS=2
      - OPENBLAS_NUM_THREADS=2
      - NUMEXPR_NUM_THREADS=2
      - CUDA_VISIBLE_DEVICES=
      - ONNXRUNTIME_PROVIDERS=CPUExecutionProvider
      # ── Face Recognition Settings ──
      - FACE_DEVICE_PREFERENCE=cpu
      - FACE_MODEL_NAME=buffalo_sc
      - FACE_DET_SIZE_CPU=320
      - MAX_IMAGE_DIMENSION=640
      - ONNX_NUM_THREADS=2
      # ── Server Settings ──
      - UVICORN_WORKERS=1
      - LAZY_LOAD_ENGINE=true
      - IMAGE_QUALITY=80
    volumes:
      # Persist ChromaDB face embeddings across container restarts
      - chroma_data:/app/chroma_store
      # Persist InsightFace model downloads (avoids re-downloading ~100MB each time)
      - insightface_models:/root/.insightface
      # Mount .env file so backend can read it directly (secure — not baked into image)
      - ./backend_smart_presence/.env:/app/.env:ro
    # Force IPv4 DNS (avoids IPv6 timeout connecting to Supabase)
    dns:
      - 8.8.8.8
      - 8.8.4.4
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    # ── Resource Limits for Low-End PCs ──
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 512M
          cpus: "0.5"

volumes:
  chroma_data:
    driver: local
  insightface_models:
    driver: local
