<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fast Face Auth (Optimized)</title>
    <style>
        :root {
            --primary: #00e5ff;
            --bg: #121212;
            --card: #1e1e1e;
            --success: #00ff88;
            --warn: #ffcc00;
            --danger: #ff4444;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: #ccc;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            margin-top: 20px;
            font-weight: 300;
            letter-spacing: 2px;
            color: var(--primary);
            text-transform: uppercase;
        }

        .container {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
            max-width: 1200px;
            padding: 20px;
        }

        .card {
            background: var(--card);
            border-radius: 12px;
            padding: 20px;
            width: 480px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid #333;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        h2 {
            margin: 0;
            color: white;
            font-size: 1.2rem;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
            display: flex;
            justify-content: space-between;
        }

        .status-indicator {
            font-size: 0.8rem;
            padding: 2px 8px;
            border-radius: 4px;
            background: #333;
            align-self: center;
        }

        .viewport {
            position: relative;
            width: 100%;
            height: 320px;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.5);
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            opacity: 0.8;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .overlay-msg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            pointer-events: none;
            display: none;
            text-align: center;
        }

        .controls {
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 10px;
            background: #2a2a2a;
            border: 1px solid #444;
            color: white;
            border-radius: 4px;
            outline: none;
            transition: border 0.3s;
        }

        input:focus {
            border-color: var(--primary);
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            background: var(--primary);
            color: #000;
            transition: transform 0.1s, filter 0.2s;
        }

        button:hover {
            filter: brightness(1.1);
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            background: #444;
            color: #888;
            cursor: not-allowed;
        }

        /* Liveness Steps */
        .steps {
            display: flex;
            gap: 5px;
            margin-top: 5px;
        }

        .step-bar {
            flex: 1;
            height: 4px;
            background: #333;
            border-radius: 2px;
            position: relation;
            overflow: hidden;
        }

        .step-fill {
            height: 100%;
            width: 0%;
            background: var(--primary);
            transition: width 0.3s ease;
        }

        .step-label {
            font-size: 0.75rem;
            text-align: center;
            color: #666;
            margin-top: 5px;
        }

        /* Logs */
        .log-box {
            font-family: monospace;
            font-size: 0.8rem;
            color: #666;
            height: 100px;
            overflow-y: auto;
            background: #151515;
            padding: 10px;
            border-radius: 4px;
        }

        .log-entry {
            margin-bottom: 2px;
        }

        .log-success {
            color: var(--success);
        }

        .log-error {
            color: var(--danger);
        }
    </style>
</head>

<body>

    <h1>Smart Face Auth <span style="font-size:0.5em; color:#666; vertical-align:middle;">v2.0 (Fast)</span></h1>

    <div class="container">

        <!-- MODULE: REGISTRATION -->
        <div class="card">
            <h2>
                Registration
                <span id="regStateBadge" class="status-indicator">Idle</span>
            </h2>

            <div class="viewport">
                <video id="vidReg" autoplay playsinline muted></video>
                <div id="msgReg" class="overlay-msg">Look Center</div>
            </div>

            <div class="steps">
                <div style="flex:1">
                    <div class="step-bar">
                        <div id="barCenter" class="step-fill"></div>
                    </div>
                    <div class="step-label">Center</div>
                </div>
                <div style="flex:1">
                    <div class="step-bar">
                        <div id="barLeft" class="step-fill"></div>
                    </div>
                    <div class="step-label">Left</div>
                </div>
                <div style="flex:1">
                    <div class="step-bar">
                        <div id="barRight" class="step-fill"></div>
                    </div>
                    <div class="step-label">Right</div>
                </div>
            </div>

            <div class="controls">
                <input type="text" id="txtName" placeholder="Full Name">
                <button id="btnReg" onclick="startReg()">Start</button>
            </div>
        </div>

        <!-- MODULE: RECOGNITION -->
        <div class="card">
            <h2>
                Surveillance
                <div>
                    <span id="faceCountBadge" class="status-indicator">0 Faces</span>
                    <span id="recStateBadge" class="status-indicator">Offline</span>
                </div>
            </h2>

            <div class="viewport">
                <video id="vidRec" autoplay playsinline muted></video>
                <canvas id="cvsRec"></canvas>
            </div>

            <button id="btnRec" onclick="toggleRec()">Start Monitoring</button>

            <div class="log-box" id="logBox">
                <div class="log-entry">System Ready.</div>
            </div>
        </div>

    </div>

    <!-- Hidden Canvas -->
    <canvas id="tmpCanvas" style="display:none;"></canvas>

    <script>
        const WS_URL = "ws://127.0.0.1:8000/ws/face_stream";
        const API_URL = "http://127.0.0.1:8000";

        let streamReg, streamRec;
        let wsReg, wsRec;
        let regStep = 0; // 0=Idle, 1=Center, 2=Left, 3=Right
        let bestImg = null;

        // Init Cameras
        async function init() {
            try {
                streamReg = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } }); // Request lower res
                document.getElementById('vidReg').srcObject = streamReg;

                streamRec = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
                document.getElementById('vidRec').srcObject = streamRec;
                log("Cameras initialized.");
            } catch (e) { log("Camera Error: " + e.message, true); }
        }
        window.onload = init;

        function log(msg, isError = false) {
            const box = document.getElementById('logBox');
            const div = document.createElement('div');
            div.className = 'log-entry ' + (isError ? 'log-error' : '');
            div.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            box.insertBefore(div, box.firstChild);
        }

        async function capture(vid) {
            const cvs = document.getElementById('tmpCanvas');
            cvs.width = vid.videoWidth || 640;
            cvs.height = vid.videoHeight || 480;
            const ctx = cvs.getContext('2d');
            ctx.drawImage(vid, 0, 0, cvs.width, cvs.height);
            return new Promise(r => cvs.toBlob(r, 'image/jpeg', 0.85)); // 85% capture quality
        }

        // ============================
        // WEBSOCKET LOGIC (Optimized)
        // ============================
        function connect(onMsg) {
            return new Promise((resolve, reject) => {
                const ws = new WebSocket(WS_URL);
                ws.onopen = () => resolve(ws);
                ws.onerror = (e) => reject(e);
                ws.onmessage = (e) => onMsg(JSON.parse(e.data));
            });
        }

        async function loop(ws, vid) {
            if (ws.readyState !== WebSocket.OPEN) return;
            try {
                const blob = await capture(vid);
                ws.send(blob);
            } catch (e) { console.error(e); }

            // Limit to ~5 FPS (200ms) to allow CPU to breathe
            setTimeout(() => loop(ws, vid), 200);
        }

        // ============================
        // REGISTRATION
        // ============================
        async function startReg() {
            const name = document.getElementById('txtName').value;
            if (!name) return alert("Name required!");

            document.getElementById('btnReg').disabled = true;
            document.getElementById('regStateBadge').innerText = "Active";
            document.getElementById('regStateBadge').style.color = "var(--primary)";
            regStep = 1; updateUI();

            try {
                wsReg = await connect((data) => handleReg(data));
                log("Registration stream connected.");
                loop(wsReg, document.getElementById('vidReg'));
            } catch (e) {
                log("Connection Failed", true);
                resetReg();
            }
        }

        function handleReg(data) {
            if (!data.faces || data.faces.length === 0) {
                showMsg("No Face");
                return;
            }

            const face = data.faces[0];
            const pose = face.pose;

            if (regStep === 1) { // Center
                showMsg("Look at Camera");
                document.getElementById('barCenter').style.width = "50%"; // In progress

                if (pose === 'center') {
                    document.getElementById('barCenter').style.width = "100%";
                    // Capture high quality frame
                    capture(document.getElementById('vidReg')).then(b => bestImg = b);
                    regStep = 2; updateUI();
                    log("Center captured (Good)");
                }
            }
            else if (regStep === 2) { // Left
                showMsg("Turn Head LEFT ⬅️");
                if (pose === 'left') {
                    document.getElementById('barLeft').style.width = "100%";
                    regStep = 3; updateUI();
                    log("Left parsed.");
                }
            }
            else if (regStep === 3) { // Right
                showMsg("Turn Head RIGHT ➡️");
                if (pose === 'right') {
                    document.getElementById('barRight').style.width = "100%";
                    finalize();
                    regStep = 4;
                }
            }
        }

        function showMsg(txt) {
            const el = document.getElementById('msgReg');
            el.innerText = txt;
            el.style.display = 'block';
        }

        async function finalize() {
            if (wsReg) wsReg.close();
            showMsg("Saving...");

            const fd = new FormData();
            fd.append('name', document.getElementById('txtName').value);
            fd.append('file', bestImg);

            try {
                const res = await fetch(`${API_URL}/register_final`, { method: 'POST', body: fd });
                const json = await res.json();

                if (json.status === 'success') {
                    showMsg("Success! ✅");
                    log(`User '${json.name}' registered successfully.`, true); // Green text hack
                    setTimeout(resetReg, 2000);
                }
            } catch (e) {
                showMsg("Error ❌");
                log("Upload failed.", true);
                setTimeout(resetReg, 2000);
            }
        }

        function resetReg() {
            regStep = 0; updateUI();
            document.getElementById('btnReg').disabled = false;
            document.getElementById('regStateBadge').innerText = "Idle";
            document.getElementById('msgReg').style.display = 'none';
            document.getElementById('barCenter').style.width = "0%";
            document.getElementById('barLeft').style.width = "0%";
            document.getElementById('barRight').style.width = "0%";
        }

        function updateUI() {
            // Visual updates if needed
        }

        // ============================
        // RECOGNITION
        // ============================
        let isRec = false;

        async function toggleRec() {
            if (isRec) {
                if (wsRec) wsRec.close();
                isRec = false;
                document.getElementById('btnRec').innerText = "Start Monitoring";
                document.getElementById('recStateBadge').innerText = "Offline";
                const cvs = document.getElementById('cvsRec');
                cvs.getContext('2d').clearRect(0, 0, cvs.width, cvs.height);
            } else {
                try {
                    wsRec = await connect((data) => draw(data));
                    isRec = true;
                    document.getElementById('btnRec').innerText = "Stop Monitoring";
                    document.getElementById('recStateBadge').innerText = "Live";
                    document.getElementById('recStateBadge').style.color = "var(--success)";
                    loop(wsRec, document.getElementById('vidRec'));
                } catch (e) { log("Recog Connection Failed", true); }
            }
        }

        function draw(data) {
            const vid = document.getElementById('vidRec');
            const cvs = document.getElementById('cvsRec');
            cvs.width = vid.videoWidth; cvs.height = vid.videoHeight;
            const ctx = cvs.getContext('2d');
            ctx.clearRect(0, 0, cvs.width, cvs.height);

            if (!data.faces) {
                if (document.getElementById('faceCountBadge')) {
                    document.getElementById('faceCountBadge').innerText = "0 Faces";
                }
                return;
            }

            if (document.getElementById('faceCountBadge')) {
                document.getElementById('faceCountBadge').innerText = `${data.faces.length} Faces`;
            }

            data.faces.forEach(face => {
                const [x1, y1, x2, y2] = face.bbox;
                const w = x2 - x1; const h = y2 - y1;

                // Style
                let color = "var(--success)";
                if (face.name === "Unknown") color = "var(--warn)";
                if (face.is_spoof) color = "var(--danger)";

                // Box
                ctx.strokeStyle = color;
                ctx.lineWidth = 3;
                ctx.strokeRect(x1, y1, w, h);

                // Label
                ctx.fillStyle = color;
                ctx.font = "bold 16px sans-serif";
                let txt = `${face.name} ${(face.confidence * 100).toFixed(0)}%`;
                if (face.is_spoof) txt += " [SPOOF]";
                ctx.fillText(txt, x1, y1 - 10);
            });
        }

    </script>
</body>

</html>
